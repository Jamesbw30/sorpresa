<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Valeria 💕</title>

    <!-- Fuente elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Pantalla 1 -->
    <div id="intro" class="container">
        <h1>Hola Valeria ❤️</h1>
        <p>Hay algo muy importante que quiero preguntarte</p>
        <button id="revealBtn">Quiere saber qué es?</button>
    </div>

    <!-- Pantalla 2 -->
    <div id="question" class="container hidden">
        <h1>¿Quieres ser mi novia? 💖</h1>
        <button class="yes">Sí 😍</button>
        <button class="no">No 😅</button>
    </div>

    <!-- Pantalla 3 -->
    <div id="success" class="container hidden">
        <h1>Sabía que dirías que sí 😍❤️</h1>
        <h2 class="mensaje-final">
        Prometo hacerte muy feliz 💕✨</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
